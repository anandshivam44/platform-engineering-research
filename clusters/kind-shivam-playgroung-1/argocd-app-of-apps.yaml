apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: playground-1.app-of-apps
  namespace: argocd
  annotations:
    argocd.argoproj.io/refresh-interval: "360s"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://github.com/anandshivam44/platform-engineering-research.git
      targetRevision: main
      path: clusters/kind-shivam-playgroung-1/app-of-apps/nginx
      directory:
        exclude: "*-secret.yaml"
    - repoURL: https://github.com/anandshivam44/platform-engineering-research.git
      targetRevision: main
      path: clusters/kind-shivam-playgroung-1/app-of-apps/product-1
      directory:
        exclude: "*-secret.yaml"
    - repoURL: https://github.com/anandshivam44/platform-engineering-research.git
      targetRevision: main
      path: clusters/kind-shivam-playgroung-1/app-of-apps/product-2
      directory:
        exclude: "*-secret.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    managedNamespaceMetadata:
      labels:
        owner: argocd
      annotations:
        team: sre

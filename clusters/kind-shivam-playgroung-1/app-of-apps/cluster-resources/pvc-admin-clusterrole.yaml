---
# Full PVC management including delete — bind only to dedicated ops/SRE accounts.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pvc-admin
rules:
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
# Read-write access to PVCs without the delete verb — for general developer roles.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pvc-editor
rules:
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
# Bind pvc-admin to the platform-engineers group (SRE / platform team only).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pvc-admin-binding
subjects:
  - kind: Group
    name: platform-engineers
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: pvc-admin
  apiGroup: rbac.authorization.k8s.io
---
# Bind pvc-editor to both product teams (team-a and team-b) — create/update PVCs, no delete.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pvc-editor-binding
subjects:
  - kind: Group
    name: team-a
    apiGroup: rbac.authorization.k8s.io
  - kind: Group
    name: team-b
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: pvc-editor
  apiGroup: rbac.authorization.k8s.io

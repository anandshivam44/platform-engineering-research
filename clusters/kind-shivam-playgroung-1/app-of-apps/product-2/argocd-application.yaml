apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kind-shivam-playgroung-1.product-2
  namespace: argocd
  labels:
    env: dev
    app: product-2
spec:
  project: default
  source:
    repoURL: https://github.com/anandshivam44/platform-engineering-research.git
    targetRevision: main
    path: clusters/kind-shivam-playgroung-1/app-of-apps/product-2/kustomize
  destination:
    server: https://kubernetes.default.svc
    namespace: product-2
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

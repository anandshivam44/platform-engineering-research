# Shared with setup-argocd/helmfile.yaml (bootstrap) and Argo CD Application (GitOps).
# Single source of truth for Argo CD Helm values on this cluster.

server:
  service:
    type: ClusterIP
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

configs:
  params:
    server.insecure: false

  cm:
    # Must match how you open the UI (see RUNBOOK OIDC notes).
    url: https://localhost:8080
    oidc.config: |
      name: Azure
      issuer: https://login.microsoftonline.com/939f575e-0369-4929-a7b3-9c18af593c11/v2.0
      clientID: bdf1cc2b-2d99-42a4-92ce-7b950257c64f
      clientSecret: $argocd-oidc-azure:clientSecret
      requestedScopes:
        - openid
        - profile
        - email
      # Azure emits group Object IDs in the "groups" claim — map them in policy.csv below.
      groupsClaim: groups

  rbac:
    policy.default: role:viewer
    scopes: "[groups, email]"
    policy.csv: |
      p, role:platform-admin, applications,    *, */*, allow
      p, role:platform-admin, applicationsets, *, */*, allow
      p, role:platform-admin, clusters,        *, *,   allow
      p, role:platform-admin, repositories,    *, *,   allow
      p, role:platform-admin, accounts,        *, *,   allow
      p, role:platform-admin, logs,            *, */*, allow
      p, role:platform-admin, exec,            *, */*, allow

      p, role:viewer, applications,  get, */*, allow
      p, role:viewer, repositories,  get, *,   allow

      p, role:app-operator, applications,    get,       */*, allow
      p, role:app-operator, applications,    sync,      */*, allow
      p, role:app-operator, applications,    action/*,  */*, allow
      p, role:app-operator, logs,            get,       */*, allow
      p, role:app-operator, repositories,    get,       *,   allow

      g, d8a37339-10b1-40fd-a32d-184838519df2, role:platform-admin
      g, ce68bf36-8010-4af0-b0ed-f69ce32568a4, role:app-operator

controller:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

repoServer:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

applicationSet:
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

notifications:
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

# Direct OIDC to Azure (oidc.config above) — argocd-server talks to Entra; Dex not used.
dex:
  enabled: false

redis:
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

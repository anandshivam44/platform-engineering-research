apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: playground-2-app-of-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/anandshivam44/platform-engineering-research.git
    targetRevision: main
    path: clusters/kind-shivam-playground-2/argocd-apps
  destination:
    server: https://172.18.0.3:6443
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

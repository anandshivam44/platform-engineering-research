apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kind-shivam-playground-2.product-1
  namespace: argocd
  labels:
    env: dev
    app: product-1
spec:
  project: default
  sources:
    - repoURL: https://github.com/anandshivam44/platform-engineering-research.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/anandshivam44/platform-engineering-research.git
      targetRevision: main
      path: clusters/kind-shivam-playground-2/product-1/helm
      helm:
        valueFiles:
          - $values/clusters/kind-shivam-playground-2/product-1/overrides.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: product-1
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

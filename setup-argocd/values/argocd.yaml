server:
  service:
    type: ClusterIP
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

configs:
  params:
    server.insecure: false

  cm:
    # ArgoCD server URL — update to your actual ingress URL when exposing externally
    url: https://argocd.example.com

    # OIDC SSO — uncomment and fill in when an IdP (GitHub OAuth, Google, Okta, etc.) is available
    # oidc.config: |
    #   name: GitHub
    #   issuer: https://token.actions.githubusercontent.com
    #   clientID: <github-oauth-app-client-id>
    #   clientSecret: $oidc.github.clientSecret
    #   requestedScopes: ["openid", "profile", "email", "read:org"]
    #   requestedIDTokenClaims:
    #     groups:
    #       essential: true

  rbac:
    # deny-by-default: any authenticated user who is not in a mapped group gets read-only access
    policy.default: role:viewer

    # Scopes to extract from the OIDC token for group membership
    scopes: "[groups, email]"

    policy.csv: |
      # ── Platform admin ───────────────────────────────────────────────────────
      # Full access to all resources across all projects
      p, role:platform-admin, applications,    *, */*, allow
      p, role:platform-admin, applicationsets, *, */*, allow
      p, role:platform-admin, clusters,        *, *,   allow
      p, role:platform-admin, repositories,    *, *,   allow
      p, role:platform-admin, accounts,        *, *,   allow
      p, role:platform-admin, logs,            *, */*, allow
      p, role:platform-admin, exec,            *, */*, allow

      # ── team-a → product-1 ───────────────────────────────────────────────────
      p, role:product-1-engineer, applications, get,      product-1/*, allow
      p, role:product-1-engineer, applications, sync,     product-1/*, allow
      p, role:product-1-engineer, applications, override, product-1/*, allow
      p, role:product-1-engineer, applications, action,   product-1/*, allow
      p, role:product-1-engineer, logs,         get,      product-1/*, allow

      # ── team-b → product-2 ───────────────────────────────────────────────────
      p, role:product-2-engineer, applications, get,      product-2/*, allow
      p, role:product-2-engineer, applications, sync,     product-2/*, allow
      p, role:product-2-engineer, applications, override, product-2/*, allow
      p, role:product-2-engineer, applications, action,   product-2/*, allow
      p, role:product-2-engineer, logs,         get,      product-2/*, allow

      # ── viewer ────────────────────────────────────────────────────────────────
      # Read-only across all projects (also the policy.default for unknown users)
      p, role:viewer, applications,  get, */*, allow
      p, role:viewer, repositories,  get, *,   allow

      # ── Group → Role bindings ─────────────────────────────────────────────────
      # SSO group names must match groups returned by the configured OIDC provider
      g, platform-engineers, role:platform-admin
      g, team-a,             role:product-1-engineer
      g, team-b,             role:product-2-engineer

      # Break-glass: local ArgoCD admin account always gets full access
      g, admin, role:platform-admin

controller:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

repoServer:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

applicationSet:
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

notifications:
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

dex:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 50m
      memory: 64Mi

redis:
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-2
  namespace: product-2
  labels:
    app: product-2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-2
  template:
    metadata:
      labels:
        app: product-2
    spec:
      containers:
        - name: product-2
          image: nginx:alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: product-2-pvc

# Default values for product-1 chart. Cluster-specific overrides stay in
# clusters/<cluster>/argocd-applications/product-1/values.yaml
replicaCount: 1

nameOverride: ""
fullnameOverride: "product-1"

image:
  repository: nginx
  tag: "alpine"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 80

resources:
  requests:
    cpu: 10m
    memory: 16Mi
  limits:
    cpu: 50m
    memory: 64Mi

pvc:
  enabled: true
  storageClassName: "standard-retain"
  accessMode: ReadWriteOnce
  size: 100Mi
  mountPath: /data

pdb:
  enabled: true
  minAvailable: 1

livenessProbe:
  enabled: true
  initialDelaySeconds: 10
  periodSeconds: 15
  path: /

readinessProbe:
  enabled: true
  initialDelaySeconds: 5
  periodSeconds: 10
  path: /
